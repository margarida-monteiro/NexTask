<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>NexTask - Editar Tarefa</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="page-body">

    <nav class="nav">
        <a class="link-secondary" href="{% url 'board' task.board.id %}">⬅ Voltar para o Board: {{ task.board.title }}</a>
    </nav>

    <h1 class="page-title">🔎 Configurações do Cartão (Task #{{ task.id }})</h1>
    <hr class="divider">

    <form method="POST" class="task-form task-form-single">
        {% csrf_token %}
        
        <p>
            <label class="form-label">Título da Task:</label><br>
            <input type="text" name="title" value="{{ task.title }}" required class="form-input">
        </p>
        
        <p>
            <label class="form-label">Descrição da Atividade:</label><br>
            <textarea name="description" rows="5" class="form-textarea">{{ task.description }}</textarea>
        </p>
        
        <p>
            <label class="form-label">Estado de Execução:</label><br>
            <select name="status" class="form-select">
                <option value="PENDING" {% if task.status == 'PENDING' %}selected{% endif %}>Pendente</option>
                <option value="IN_PROGRESS" {% if task.status == 'IN_PROGRESS' %}selected{% endif %}>Em Progresso</option>
                <option value="DONE" {% if task.status == 'DONE' %}selected{% endif %}>Concluída</option>
            </select>
        </p>
        
        <p>
            <label class="form-label">Nível de Prioridade:</label><br>
            <select name="priority" class="form-select">
                <option value="LOW" {% if task.priority == 'LOW' %}selected{% endif %}>Baixa</option>
                <option value="MEDIUM" {% if task.priority == 'MEDIUM' %}selected{% endif %}>Média</option>
                <option value="HIGH" {% if task.priority == 'HIGH' %}selected{% endif %}>Alta</option>
            </select>
        </p>
        
        <p class="meta-text">
            Criada em: {{ task.created_at }} | Última alteração: {{ task.updated_at }}
        </p>
        
        <button type="submit" class="button-primary full-width">
            💾 Guardar Alterações no NexTask
        </button>
    </form>

</body>
</html>
